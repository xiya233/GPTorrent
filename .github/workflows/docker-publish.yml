name: Publish Docker Image to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/xiya233/gptorrent

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (default branch)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: meta_branch
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge
            type=sha,prefix=sha-

      - name: Build and push (default branch)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: build_branch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_branch.outputs.tags }}
          labels: ${{ steps.meta_branch.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary (default branch)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          {
            echo "## GHCR Publish Summary"
            echo ""
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Digest: \`${{ steps.build_branch.outputs.digest }}\`"
            echo "- Tags:"
            echo "${{ steps.meta_branch.outputs.tags }}" | sed 's/^/  - `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Extract Docker metadata (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        id: meta_tag
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        id: build_tag
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_tag.outputs.tags }}
          labels: ${{ steps.meta_tag.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          {
            echo "## GHCR Publish Summary"
            echo ""
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Digest: \`${{ steps.build_tag.outputs.digest }}\`"
            echo "- Tags:"
            echo "${{ steps.meta_tag.outputs.tags }}" | sed 's/^/  - `/' | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"
